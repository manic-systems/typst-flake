name: Update

on:
  schedule:
    # Run weekly on Monday at 06:07 UTC.
    - cron: "7 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Update Typst source pins
        run: nix develop --command nu scripts/update-sources.nu

      - name: Diff
        id: diff
        run: |
          if git diff --quiet sources.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload source pins
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: sources-json
          path: sources.json

  check:
    needs: update
    if: needs.update.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download source pins
        uses: actions/download-artifact@v8
        with:
          name: sources-json
          path: .

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Check source pins
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build \
            ".#checks.${system}.sources-json" \
            ".#checks.${system}.tack-lock" \
            --print-build-logs \
            --no-link

      - name: Build Typst packages
        run: nix build .#default .#main --print-build-logs --no-link

      - name: Run Typst checks
        if: matrix.os == 'ubuntu-latest'
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build \
            ".#checks.${system}.typst-fmt" \
            ".#checks.${system}.typst-clippy" \
            ".#checks.${system}.typst-test" \
            --print-build-logs \
            --no-link

  commit:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download source pins
        uses: actions/download-artifact@v8
        with:
          name: sources-json
          path: .

      - name: Commit, PR, and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git switch --create "update-typst-${{ github.run_id }}-${{ github.run_attempt }}"
          git add sources.json
          git commit --message "Update Typst source pins"
          git push origin HEAD

          { echo '```diff'; git diff HEAD^ -- sources.json; echo '```'; } \
            | gh pr create --title "Update Typst source pins" --body-file -
          gh pr merge --rebase --delete-branch || { gh pr close --delete-branch; exit 1; }
